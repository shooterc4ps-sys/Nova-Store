<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Store - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-tema: #8a2be2; 
            --discord-azul: #5865F2;
            --negro-fondo: #0a0a0a;
            --negro-card: #141414;
        }

        body {
            background-color: var(--negro-fondo);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVEGACIÓN */
        nav {
            background-color: #000;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 2px solid var(--color-tema);
            box-sizing: border-box;
        }

        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-brand img { height: 50px; width: auto; }
        .nav-logo { font-weight: bold; font-size: 1.5rem; color: var(--color-tema); text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: var(--color-tema); }

        .btn-discord-login { background-color: var(--discord-azul); color: white; padding: 10px 15px; border-radius: 5px; font-weight: 600; font-size: 0.8rem; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-discord-login:hover { background-color: #4752c4; transform: translateY(-2px); }

        /* HERO SECTION */
        .hero { display: flex; min-height: 100vh; align-items: center; padding: 80px 8% 0; box-sizing: border-box; gap: 5%; }
        .hero-text { flex: 1.2; z-index: 10; }
        .hero-text h1 { font-size: 4.5rem; margin: 0; line-height: 1.1; }
        .hero-text h1 span { color: var(--color-tema); }
        .hero-text p { color: #aaa; margin: 30px 0; max-width: 600px; font-size: 1.3rem; }

        .hero-logo { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .logo-glow { position: absolute; width: 400px; height: 400px; background: var(--color-tema); filter: blur(150px); opacity: 0.35; border-radius: 50%; }
        
        .hero-logo img { 
            max-width: 550px; 
            width: 100%; 
            height: auto; 
            position: relative; 
            z-index: 2; 
            filter: drop-shadow(0 0 30px var(--color-tema));
        }

        /* CATÁLOGO */
        #products-section { display: none; padding: 100px 8%; text-align: center; }
        .catalog-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 50px; }
        .card { background: var(--negro-card); padding: 40px; border-radius: 15px; width: 300px; transition: 0.3s; border: 1px solid #222; }
        .card:hover { border-color: var(--color-tema); transform: translateY(-10px); }

        /* REPRODUCTOR */
        .music-player { position: fixed; bottom: 20px; right: 20px; z-index: 2000; background: rgba(0,0,0,0.9); border: 1px solid var(--color-tema); padding: 10px 15px; border-radius: 50px; display: flex; align-items: center; gap: 12px; }
        .music-btn { background: var(--color-tema); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }

        @media (max-width: 1100px) {
            .hero { flex-direction: column-reverse; text-align: center; padding-top: 120px; }
            .hero-text h1 { font-size: 2.8rem; }
            .hero-logo img { max-width: 320px; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://cdn.discordapp.com/attachments/1457029870248005723/1476986459998126223/Hades66_Ovi_LMR_-_Si_Mijo_Si_EL_SEI66EIS.mp3" type="audio/mpeg">
    </audio>

    <div class="music-player">
        <span id="txt-m-status" style="font-size: 0.7rem; color: #777;">PAUSADO</span>
        <button class="music-btn" onclick="toggleMusic()" id="mBtn"><i class="fas fa-play"></i></button>
    </div>

    <nav>
        <div class="nav-brand">
            <img src="https://media.discordapp.net/attachments/1494658372866408628/1495604211768102952/logo.png" alt="Logo">
            <h1 class="nav-logo">Nova Store</h1>
        </div>

        <div class="nav-right">
            <ul class="nav-links">
                <li><a onclick="window.scrollTo({top:0, behavior:'smooth'})">Inicio</a></li>
                <li><a href="https://discord.gg/RZfAkAK7" target="_blank" style="color: var(--discord-azul); font-weight: bold;"><i class="fab fa-discord"></i> Discord</a></li>
            </ul>
            <button class="btn-discord-login" id="loginBtnNav" onclick="iniciarLogin()">
                <i class="fab fa-discord"></i> <span>Iniciar sesión</span>
            </button>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-text">
            <h1>Nova <span>Store</span></h1>
            <p>La tienda oficial de nuestra comunidad. Conecta tu Discord para acceder a rangos exclusivos y beneficios para MTA.</p>
            <button class="btn-discord-login" style="padding: 18px 40px; font-size: 1.1rem;" onclick="iniciarLogin()">
                <i class="fab fa-discord"></i> <span>Iniciar sesión con Discord</span>
            </button>
        </div>
        
        <div class="hero-logo">
            <div class="logo-glow"></div>
            <img src="https://media.discordapp.net/attachments/1494658372866408628/1495604211768102952/logo.png" alt="Logo Nova">
        </div>
    </main>

    <section id="products-section">
        <h2>Catálogo <span>Nova</span></h2>
        <div class="catalog-grid">
            <div class="card">
                <div style="font-size: 3rem;">📦</div>
                <h3>Rango VIP</h3>
                <p>Ventajas exclusivas en el servidor.</p>
                <button class="btn-discord-login" style="width: 100%; justify-content: center; background: var(--color-tema);">Comprar</button>
            </div>
        </div>
    </section>

    <script>
        // URL EXACTA QUE ME PASASTE
        const DISCORD_URL = "https://discord.com/oauth2/authorize?client_id=1494149627568586793&response_type=code&redirect_uri=https%3A%2F%2Fshooterc4ps-sys.github.io%2FNova-Store%2F&scope=guilds+identify";
        
        const music = document.getElementById('bgMusic');

        function iniciarLogin() { 
            window.location.href = DISCORD_URL; 
        }

        function toggleMusic() {
            if (music.paused) { 
                music.play(); 
                document.getElementById('mBtn').innerHTML = '<i class="fas fa-pause"></i>'; 
                document.getElementById('txt-m-status').innerText = "SONANDO";
                document.getElementById('txt-m-status').style.color = "#8a2be2";
            } else { 
                music.pause(); 
                document.getElementById('mBtn').innerHTML = '<i class="fas fa-play"></i>'; 
                document.getElementById('txt-m-status').innerText = "PAUSADO";
                document.getElementById('txt-m-status').style.color = "#777";
            }
        }

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('code')) {
                document.getElementById("products-section").style.display = "block";
                document.getElementById("loginBtnNav").innerHTML = "Autorizado";
                document.getElementById("products-section").scrollIntoView({behavior: 'smooth'});
            }
        });
    </script>
</body>
</html>
